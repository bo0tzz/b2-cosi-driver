apiVersion: v1
kind: ServiceAccount
metadata:
  name: b2-cosi-driver
  namespace: b2-cosi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: b2-cosi-driver
rules:
  - apiGroups: ["objectstorage.k8s.io"]
    resources:
      - buckets
      - bucketaccesses
      - bucketclaims
      - bucketaccessclasses
      - bucketclasses
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: b2-cosi-driver
subjects:
  - kind: ServiceAccount
    name: b2-cosi-driver
    namespace: b2-cosi-system
roleRef:
  kind: ClusterRole
  name: b2-cosi-driver
  apiGroup: rbac.authorization.k8s.io
